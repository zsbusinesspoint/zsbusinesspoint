<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z.S Computers | Authorised CSC Prasad Kheda</title>
    
    <style>
        :root {
            --primary-blue: #002b5b;
            --accent-orange: #ff9900;
            --main-bg: #eef2f7; 
            --text-dark: #333;
        }

        /* All your styles must stay inside here */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(180deg, #d1d9e6 0%, #eef2f7 100%);
            background-attachment: fixed;
            margin: 0; 
            color: var(--text-dark);
            line-height: 1.6;
        }
        
        header { background: #ffffff; padding: 20px; text-align: center; }
        /* Add your other styles here... */
    </style>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };
    </script>
</head>

<body>
    <header>
        <h1>Z.S COMPUTERS</h1>
        <p>Prasad Kheda, Unnao | CSC Authorised Centre</p>
    </header>
    
    <main style="padding: 20px; text-align: center;">
        <h2>Welcome to Z.S Computers</h2>
        <p>Your website is now working and protected.</p>
    </main>
</body>
</html>
